version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ecom_postgres
    environment:
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ecom_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom_backend
    environment:
      DATABASE_URL: postgresql://ecom_user:secure_password@postgres:5432/ecom_db
      FLASK_ENV: production
      FLASK_APP: run.py
      SECRET_KEY: your_super_secret_key_change_in_production
      JWT_SECRET_KEY: your_jwt_secret_key_change_in_production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - ecom_network
    command: gunicorn -w 4 -b 0.0.0.0:5000 run:app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ecom_network
    command: npm start

volumes:
  postgres_data:
  backend_uploads:

networks:
  ecom_network:
    driver: bridge
